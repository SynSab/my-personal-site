<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmett Solomon</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

    <header>
        <h1>Emmett Solomon</h1>
    </header>

    <main>
        <section id="intro">
            <div class="flow">

                <span class="fragment">
                    I am a <span class="picker" id="picker-who">
                        <span class="picker-ghost">stranger</span>
                        <span class="word" data-value="stranger">stranger</span>
                        <span class="word" data-value="friend">friend</span>
                        <span class="word" data-value="robot">robot</span>
                    </span>
                </span>

                <span class="fragment branch" id="branch-friend">
                    &nbsp;and I am here for <span class="picker" id="picker-for">
                        <span class="picker-ghost">Ties</span>
                        <span class="word" data-value="ties">Ties</span>
                    </span>
                </span>

            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>

</body>
</html>
